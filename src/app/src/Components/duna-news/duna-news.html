<h1 class="title">Featured Streamers</h1>

<div class="flexerino">
    @for (stream of featuredStreams; track stream.channel) {
    <div class="bandeauLastStream">
        <h1 class="title">Derniers Streams</h1>
        <h2 class="title streamer">{{stream.channel}}</h2>
        <!--EXEMPLE TWITCH
            <iframe 
                src="https://player.twitch.tv/?video=2774900023&parent=www.example.com" 
                frameborder="0" 
                allowfullscreen="true" 
                scrolling="no" 
                height="378" 
                width="620">
            </iframe>
        -->
        <iframe class="twitch-frame" scrolling="no" frameborder="0" [src]="getEmbedUrl(stream)" height="300"
            width="100%" allowfullscreen>
        </iframe>
    </div>
    }
</div>
